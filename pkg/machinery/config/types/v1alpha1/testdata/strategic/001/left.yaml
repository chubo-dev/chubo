version: v1alpha1
debug: true
persist: true
machine:
  type: controlplane
  token: tok-left
  certSANs: []
  files:
    - content: left=1
      permissions: 0o644
      path: /etc/chubo/left.conf
      op: overwrite
  sysctls:
    net.ipv4.ip_forward: "1"
cluster:
  clusterName: left
  discovery:
    enabled: true
    registries:
      service:
        endpoint: https://discovery.left
