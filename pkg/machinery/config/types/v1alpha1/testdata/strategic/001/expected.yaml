version: v1alpha1
debug: false
persist: true
machine:
  type: controlplane
  token: tok-left
  certSANs: []
  files:
    - content: left=1
      permissions: 0o644
      path: /etc/chubo/left.conf
      op: overwrite
    - content: right=1
      permissions: 0o600
      path: /etc/chubo/right.conf
      op: overwrite
  sysctls:
    net.ipv4.ip_forward: "0"
    vm.swappiness: "10"
cluster:
  clusterName: right
  discovery:
    enabled: true
    registries:
      service:
        endpoint: https://discovery.right
