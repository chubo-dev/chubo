syntax = "proto3";

package chubo.resource.definitions.v1alpha1;

option go_package = "github.com/chubo-dev/chubo/pkg/machinery/api/resource/definitions/v1alpha1";
option java_package = "dev.chubo.api.resource.definitions.v1alpha1";

// ServiceSpec describe service state.
message ServiceSpec {
  bool running = 1;
  bool healthy = 2;
  bool unknown = 3;
}
