syntax = "proto3";

package chubo.resource.definitions.files;

option go_package = "github.com/chubo-dev/chubo/pkg/machinery/api/resource/definitions/files";
option java_package = "dev.chubo.api.resource.definitions.files";

// EtcFileSpecSpec describes status of rendered secrets.
message EtcFileSpecSpec {
  bytes contents = 1;
  uint32 mode = 2;
  string selinux_label = 3;
}

// EtcFileStatusSpec describes status of rendered secrets.
message EtcFileStatusSpec {
  string spec_version = 1;
}

