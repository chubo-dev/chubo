# Repository CI (Chubo fork)
#
# Keep this workflow focused on the Chubo OS surface:
# - unit tests
# - k8s-less guardrails (rootfs + deps + CLI surface)
# - QEMU E2E lanes on self-hosted runners

name: ci

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      run_qemu:
        description: "Run self-hosted QEMU E2E jobs"
        required: false
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container
      - name: preflight-disk-cleanup
        run: |
          df -h
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL || true
          sudo rm -f /home/runner/actions-runner/cached/_diag/Worker_*.log || true
          docker buildx prune -af || true
          docker system prune -af --volumes || true
          df -h
      - name: unit-tests
        run: |
          make unit-tests > /tmp/unit-tests.log 2>&1 || {
            tail -n 400 /tmp/unit-tests.log
            exit 1
          }

  cli-target-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container
      - name: chuboctl/talosctl target smoke
        run: |
          make target-chuboctl-linux-amd64
          make target-talosctl-linux-amd64

  chubo-guardrails:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container
      - name: preflight-disk-cleanup
        run: |
          df -h
          docker buildx prune -af || true
          docker system prune -af --volumes || true
          df -h
      - name: chubo-guardrails
        run: make chubo-guardrails

  chubo-e2e-core-qemu:
    needs: chubo-guardrails
    if: github.event_name == 'workflow_dispatch' && inputs.run_qemu == true
    runs-on: self-hosted
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container
      - name: verify-sudo
        run: sudo -n true
      - name: chubo-e2e-core-qemu
        run: sudo -n -E ./hack/chubo/e2e-core-qemu.sh

  chubo-e2e-helper-bundles-qemu:
    needs: chubo-guardrails
    if: github.event_name == 'workflow_dispatch' && inputs.run_qemu == true
    runs-on: self-hosted
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container
      - name: verify-sudo
        run: sudo -n true
      - name: chubo-e2e-helper-bundles-qemu
        run: sudo -n -E ./hack/chubo/e2e-helper-bundles-qemu.sh

  chubo-e2e-opengyoza-quorum-qemu:
    needs: chubo-guardrails
    if: github.event_name == 'workflow_dispatch' && inputs.run_qemu == true
    runs-on: self-hosted
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container
      - name: verify-sudo
        run: sudo -n true
      - name: chubo-e2e-opengyoza-quorum-qemu
        run: sudo -n -E ./hack/chubo/e2e-opengyoza-quorum-qemu.sh

  chubo-e2e-cluster-qemu:
    needs: chubo-guardrails
    if: github.event_name == 'workflow_dispatch' && inputs.run_qemu == true
    runs-on: self-hosted
    timeout-minutes: 150
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container
      - name: verify-sudo
        run: sudo -n true
      - name: chubo-e2e-cluster-qemu
        run: sudo -n -E CONTROLPLANE_COUNT=2 SKIP_NOMAD_JOB_PROBE=0 ./hack/chubo/e2e-cluster-qemu.sh
