# Repository CI (Chubo fork)
#
# Keep this workflow focused on the Chubo OS surface:
# - unit tests
# - k8s-less guardrails (rootfs + deps + CLI surface)
# - optional QEMU E2E on self-hosted runners

name: ci

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container
      - name: unit-tests
        run: make unit-tests

  chubo-guardrails:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container
      - name: chubo-guardrails
        run: make chubo-guardrails

  chubo-e2e-qemu:
    # QEMU E2E requires root + qemu + networking setup; keep it manual unless a
    # dedicated self-hosted runner group is available.
    if: github.event_name == 'workflow_dispatch'
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container
      - name: chubo-e2e-qemu
        run: sudo -E ./hack/chubo/e2e-core-qemu.sh
